# ============================================================
# HRMS Python 后端 - CD 持续部署工作流
# 说明：main 分支推送时自动构建镜像、打标签并推送到 GHCR
# 触发条件：仅 push 到 main 分支
# ============================================================

name: CD - 构建与发布

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker/**"
      - ".github/workflows/cd.yml"

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/hrms-backend

jobs:
  # ========================================
  # 构建并发布 Docker 镜像
  # 说明：使用 commit SHA 作为镜像标签，确保版本可追溯
  # ========================================
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
      image_url: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}

    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 生成版本变量（短 SHA 作为标签，镜像名转小写）
      - name: 生成版本变量
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "image_name=$(echo '${{ env.REGISTRY }}/${{ github.repository }}/hrms-backend' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 登录 GitHub Container Registry
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 设置 Docker Buildx
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 构建并推送 Docker 镜像（多标签）
      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.sha_short }}
            ${{ steps.vars.outputs.image_name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.vars.outputs.build_date }}
          cache-from: type=inline
          cache-to: type=inline

      # 输出部署信息摘要
      - name: 输出部署摘要
        run: |
          echo "## 🚀 部署信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像仓库 | \`${{ steps.vars.outputs.image_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像标签 | \`${{ steps.vars.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | \`${{ steps.vars.outputs.build_date }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发者 | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 拉取镜像" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
